<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Window</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-box {
      width: 400px;
      height: 500px;
      display: flex;
      flex-direction: column;
      border: 1px solid #ccc;
      padding: 10px;
      background-color: #f9f9f9;
    }
    .messages {
      flex-grow: 1;
      overflow-y: auto;
    }
    .message {
      margin-bottom: 10px;
    }
    .message.user {
      text-align: right;
    }
    input[type="text"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      margin-top: 10px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<div class="chat-box">
  <div class="messages" id="messages"></div>
  <input type="text" id="user-input" placeholder="Type your message..." onkeydown="if(event.key === 'Enter'){ sendMessage(); }">
</div>

<script>
  const messagesDiv = document.getElementById('messages');
  const userInput = document.getElementById('user-input');

  function displayMessage(content, user = 'bot') {
    const message = document.createElement('div');
    message.className = `message ${user}`;
    message.textContent = content;
    messagesDiv.appendChild(message);
    messagesDiv.scrollTop = messagesDiv.scrollHeight; // Scroll to the bottom
  }

  async function sendMessage() {
    const message = userInput.value;
    if (message.trim() === '') return;

    displayMessage(message, 'user');
    userInput.value = '';

    // Call Dify API to get response
    const response = await fetch('http://47.122.73.252:8088/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({ message: message })
    });

    const data = await response.json();
    if (data && data.reply) {
      displayMessage(data.reply, 'bot');
    }
  }
</script>

</body>
</html>
